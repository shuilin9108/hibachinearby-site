<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Online | Hibachi by ShuiLink</title>
  <meta name="description"
    content="Book private hibachi catering online. Check availability and submit your hibachi party request securely." />
  <link rel="canonical" href="https://www.shuilink.com/hibachi/book-online.html" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #f7f7f8;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      background: rgba(17, 17, 17, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 72px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      background: #d62828;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(214, 40, 40, 0.25);
    }

    .booking-shell {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
    }

    .booking-frame-wrap {
      width: 100%;
      height: calc(100vh - 72px);
      background: #fff;
    }

    .booking-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    .fallback-bar {
      display: none;
    }

    @media (max-width: 768px) {
      .nav-inner {
        height: 64px;
        padding: 0 12px;
      }

      .logo a {
        font-size: 18px;
      }

      .nav-right {
        gap: 8px;
      }

      .nav-link {
        display: none;
      }

      .nav-btn {
        padding: 10px 14px;
        font-size: 13px;
      }

      .booking-frame-wrap {
        height: calc(100vh - 64px);
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo">
        <a href="index.html">🔥 Hibachi by ShuiLink</a>
      </div>

      <div class="nav-right">
        <a href="index.html" class="nav-link">Home</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="cities.html" class="nav-link">Cities</a>
        <a href="gallery.html" class="nav-link">Gallery</a>
        <a href="faq.html" class="nav-link">FAQ</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="https://hibachifinder.vercel.app/booking" class="nav-btn">Open Full Page</a>
      </div>
    </div>
  </nav>

  <main class="booking-shell">
    <div class="booking-frame-wrap">
      <iframe
        class="booking-frame"
        src="https://hibachifinder.vercel.app/booking"
        title="Secure Hibachi Booking"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="clipboard-write"
      ></iframe>
    </div>
  </main>

</body>

</html>
