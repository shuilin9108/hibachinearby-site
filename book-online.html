<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Book Online | Hibachi Nearby</title>
<meta name="description" content="Book Hibachi Nearby online for private hibachi catering and backyard hibachi parties." />

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #0b0b0b;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

/* ===== TOP BAR ===== */
.topbar {
  background: #111;
  text-align: center;
  padding: 10px;
  font-size: 13px;
  font-weight: 700;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 6%;
}

.logo a {
  color: #fff;
  text-decoration: none;
  font-weight: 900;
  font-size: 20px;
}

/* ===== MENU ===== */
.menu {
  display: flex;
  gap: 22px;
}

.menu a {
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
}

.menu a:hover {
  color: #ff7a1a;
}

/* ===== BUTTON (橙色主色) ===== */
.nav-btn {
  padding: 12px 22px;
  border-radius: 999px;
  background: linear-gradient(135deg, #ff7a1a, #ff3d00);
  color: #fff;
  text-decoration: none;
  font-weight: 900;
  box-shadow: 0 10px 24px rgba(255,122,26,0.35);
}

/* ===== MOBILE MENU ===== */
.menu-toggle {
  display: none;
  font-size: 28px;
  background: none;
  border: none;
  color: #fff;
}

/* ===== BOOKING FRAME ===== */
.booking-frame-shell {
  width: 100%;
  height: calc(100vh - 120px);
  background: #fff;
}

.booking-frame {
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== FALLBACK ===== */
.booking-fallback {
  display: none;
  padding: 12px;
  text-align: center;
  background: #111;
  font-size: 14px;
}

.booking-fallback a {
  color: #ff7a1a;
  font-weight: 900;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  .menu {
    display: none;
    position: absolute;
    top: 70px;
    left: 0;
    right: 0;
    background: #000;
    flex-direction: column;
    padding: 20px;
  }

  .menu.menu-open {
    display: flex;
  }

  .menu-toggle {
    display: block;
  }

  .nav-btn {
    display: none;
  }

  .booking-frame-shell {
    height: calc(100vh - 100px);
  }
}
</style>
</head>

<body>

<div class="topbar">
  Private Hibachi Catering · Backyard Parties · NC · SC · VA
</div>

<nav class="navbar">
  <div class="logo">
    <a href="index.html">🔥 Hibachi Nearby</a>
  </div>

  <button class="menu-toggle" id="menuToggle">☰</button>

  <div class="menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="book-online.html">Book</a>
    <a href="menu.html">Menu</a>
    <a href="cities.html">Cities</a>
    <a href="gallery.html">Gallery</a>
    <a href="faq.html">FAQ</a>
    <a href="contact.html">Contact</a>
  </div>

  <a href="https://hibachifinder-booking-web.vercel.app/hibachinearby" target="_blank" class="nav-btn">
    Open Full Page
  </a>
</nav>

<div class="booking-fallback">
  Booking not loading?
  <a href="https://hibachifinder-booking-web.vercel.app/hibachinearby" target="_blank">
    Click here
  </a>
</div>

<main class="booking-frame-shell">
  <iframe
    class="booking-frame"
    src="https://hibachifinder-booking-web.vercel.app/hibachinearby"
    title="Booking"
  ></iframe>
</main>

<script>
const menuToggle = document.getElementById("menuToggle");
const mobileMenu = document.getElementById("mobileMenu");

menuToggle.addEventListener("click", () => {
  mobileMenu.classList.toggle("menu-open");
});
</script>

</body>
</html>
